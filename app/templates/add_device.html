{% extends "base.html" %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-sm p-6">
  <h1 class="text-xl font-semibold text-gray-800 mb-6">Add Device</h1>

  <form method="post" action="/devices/add" class="flex flex-col gap-4">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Name</label>
      <input type="text" name="name" required placeholder="Living room plug"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Device type</label>
      <select name="type" required
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="plug">Smart Plug</option>
        <option value="bulb">Smart Bulb</option>
      </select>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">IP Address</label>
      <input type="text" name="ip_address" required placeholder="192.168.1.42"
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Device ID</label>
      <input type="text" name="device_id" required placeholder="bf1234abc..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p class="text-xs text-gray-400 mt-1">Found in the Tuya IoT Platform developer console under your device.</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Local Key</label>
      <input type="text" name="local_key" required placeholder="abc123xyz..."
        class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
      <p class="text-xs text-gray-400 mt-1">Found alongside the Device ID in the Tuya IoT Platform console.</p>
    </div>

    <div class="flex gap-3 pt-2">
      <a href="/"
        class="flex-1 text-center border border-gray-300 text-gray-700 px-4 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Cancel
      </a>
      <button type="submit"
        class="flex-1 bg-blue-600 text-white px-4 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">
        Add Device
      </button>
    </div>

  </form>
</div>
{% endblock %}
