{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold text-gray-800">Event History</h1>
    <span class="text-xs text-gray-400"
          hx-get="/history/rows"
          hx-trigger="every 30s"
          hx-target="#history-tbody"
          hx-swap="innerHTML">
      auto-refreshes every 30s
    </span>
  </div>

  <div class="bg-white rounded-xl shadow-sm overflow-hidden">
    <table class="w-full text-left">
      <thead class="bg-gray-50 border-b border-gray-100">
        <tr>
          <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide whitespace-nowrap">Time (UTC)</th>
          <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Category</th>
          <th class="px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wide">Event</th>
        </tr>
      </thead>
      <tbody id="history-tbody">
        {% include "partials/history_rows.html" %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
