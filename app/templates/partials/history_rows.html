{% if not events %}
<tr>
  <td colspan="3" class="px-4 py-8 text-center text-gray-400 text-sm">No events yet — automation fires will appear here.</td>
</tr>
{% endif %}
{% for event in events %}
<tr class="border-t border-gray-100 hover:bg-gray-50">
  <td class="px-4 py-2.5 text-xs text-gray-400 whitespace-nowrap font-mono">
    {{ event.timestamp.strftime("%Y-%m-%d %H:%M:%S") }}
  </td>
  <td class="px-4 py-2.5">
    <span class="inline-block px-2 py-0.5 rounded text-xs font-medium
      {% if event.category == 'error' %}bg-red-100 text-red-700
      {% else %}bg-blue-100 text-blue-700{% endif %}">
      {{ event.category }}
    </span>
  </td>
  <td class="px-4 py-2.5 text-sm text-gray-700">{{ event.message }}</td>
</tr>
{% endfor %}
