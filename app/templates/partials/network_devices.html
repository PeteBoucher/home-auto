{% if not devices %}
<p class="text-center text-gray-400 text-sm py-8">No devices found in ARP table.</p>
{% else %}
<div class="relative mt-0">
  {# horizontal branch line #}
  <div class="absolute top-0 left-0 right-0 h-px bg-gray-300"></div>
  <div class="grid grid-cols-3 sm:grid-cols-4 lg:grid-cols-6 gap-x-4 gap-y-8 pt-10">
    {% for d in devices %}
    <div class="flex flex-col items-center gap-1.5 relative">
      {# vertical stem up to branch line #}
      <div class="absolute -top-10 left-1/2 -translate-x-px w-px h-10 bg-gray-300"></div>
      <div class="w-14 h-14 rounded-full border-2 flex items-center justify-center
        {% if d.ha_name %}border-blue-400 bg-blue-50{% elif d.is_gateway or d.is_self %}border-gray-400 bg-gray-50{% else %}border-gray-200 bg-white{% endif %}">
        <i class="bi bi-{{ d.icon }} text-2xl
          {% if d.ha_name %}text-blue-600{% elif d.is_gateway or d.is_self %}text-gray-600{% else %}text-gray-400{% endif %}"></i>
      </div>
      <p class="text-xs font-medium text-center text-gray-700 leading-tight max-w-[80px] truncate"
         title="{{ d.ha_name or d.hostname }}">
        {{ d.ha_name or d.hostname }}
      </p>
      <p class="text-xs text-gray-400 font-mono">{{ d.ip }}</p>
    </div>
    {% endfor %}
  </div>
</div>
{% endif %}
