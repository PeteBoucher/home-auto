<div id="device-{{ device.id }}-schedule" class="border-t border-gray-100 pt-3">
  <form
    hx-post="/devices/{{ device.id }}/schedule"
    hx-target="#device-{{ device.id }}-schedule"
    hx-swap="outerHTML"
    class="flex flex-wrap items-center gap-2"
  >
    <span class="text-xs text-gray-400 font-medium w-9">Timer</span>
    <input
      type="time"
      name="on_time"
      value="{{ schedule.on_time if schedule else '' }}"
      required
      class="border border-gray-200 rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400"
    >
    <span class="text-xs text-gray-400">→</span>
    <input
      type="time"
      name="off_time"
      value="{{ schedule.off_time if schedule else '' }}"
      required
      class="border border-gray-200 rounded-lg px-2 py-1 text-sm focus:outline-none focus:ring-1 focus:ring-blue-400"
    >
    <label class="flex items-center gap-1 text-xs text-gray-500 ml-1 cursor-pointer">
      <input type="checkbox" name="enabled" value="1" {% if not schedule or schedule.enabled %}checked{% endif %} class="accent-green-500">
      enabled
    </label>
    <button
      type="submit"
      class="ml-auto text-xs text-blue-500 hover:text-blue-700 font-medium transition-colors"
    >Save</button>
    {% if schedule %}
    <button
      type="button"
      hx-post="/devices/{{ device.id }}/schedule/delete"
      hx-target="#device-{{ device.id }}-schedule"
      hx-swap="outerHTML"
      class="text-xs text-gray-300 hover:text-red-400 transition-colors"
    >Clear</button>
    {% endif %}
  </form>
</div>
