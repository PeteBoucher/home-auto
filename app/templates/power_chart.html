{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
  <div class="flex items-center gap-3 mb-6">
    <a href="/devices/{{ device.id }}/settings" class="text-gray-400 hover:text-gray-600 transition-colors">
      <i class="bi bi-arrow-left"></i>
    </a>
    <h1 class="text-xl font-semibold text-gray-800">{{ device.name }} — Power History</h1>
  </div>

  <div class="flex gap-2 mb-4">
    {% for h, label in [(1, "1h"), (6, "6h"), (24, "24h"), (168, "7d")] %}
    <button onclick="loadChart({{ h }})" id="btn-{{ h }}"
      class="px-3 py-1 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors">
      {{ label }}
    </button>
    {% endfor %}
  </div>

  <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
    <p class="text-xs text-gray-400 font-medium mb-3 uppercase tracking-wide">Voltage (V)</p>
    <canvas id="voltage-chart"></canvas>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
    <p class="text-xs text-gray-400 font-medium mb-3 uppercase tracking-wide">Power (W)</p>
    <canvas id="power-chart"></canvas>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
    <p class="text-xs text-gray-400 font-medium mb-3 uppercase tracking-wide">Current (A)</p>
    <canvas id="current-chart"></canvas>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-5 mb-4">
    <p class="text-xs text-gray-400 font-medium mb-3 uppercase tracking-wide">Energy today (kWh)</p>
    <canvas id="energy-today-chart"></canvas>
  </div>

  <div class="bg-white rounded-xl shadow-sm p-5">
    <p class="text-xs text-gray-400 font-medium mb-3 uppercase tracking-wide">Energy this month (kWh)</p>
    <canvas id="energy-month-chart"></canvas>
  </div>
</div>

<script src="/static/chart.umd.min.js"></script>
<script src="/static/chartjs-adapter-date-fns.bundle.min.js"></script>
<script>
  let charts = {};
  let activeHours = 6;

  const SERIES = [
    {
      id: 'voltage-chart', key: 'voltage', label: 'Voltage', color: '#3B82F6', unit: 'V',
      yAxis: { suggestedMin: 220, suggestedMax: 240, ticks: { precision: 1 } },
    },
    {
      id: 'power-chart', key: 'power', label: 'Power', color: '#F59E0B', unit: 'W',
      yAxis: { beginAtZero: true, ticks: { precision: 1 } },
    },
    {
      id: 'current-chart', key: 'current', label: 'Current', color: '#10B981', unit: 'mA', scale: 1000,
      yAxis: { beginAtZero: true, ticks: { precision: 0 } },
    },
    {
      id: 'energy-today-chart', key: 'energy_today', label: 'Energy today', color: '#8B5CF6', unit: 'kWh',
      yAxis: { beginAtZero: true, ticks: { precision: 2 } },
    },
    {
      id: 'energy-month-chart', key: 'energy_month', label: 'Energy this month', color: '#EC4899', unit: 'kWh',
      yAxis: { beginAtZero: true, ticks: { precision: 2 } },
    },
  ];

  function makeChart(canvasId, label, color, unit, yAxis, points) {
    return new Chart(document.getElementById(canvasId), {
      type: 'line',
      data: {
        datasets: [{
          label,
          data: points,
          borderColor: color,
          backgroundColor: color + '18',
          borderWidth: 1.5,
          tension: 0.3,
          pointRadius: 0,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        animation: false,
        plugins: { legend: { display: false } },
        scales: {
          x: {
            type: 'time',
            time: {
              tooltipFormat: 'HH:mm',
              displayFormats: { minute: 'HH:mm', hour: 'HH:mm', day: 'dd MMM' },
            },
            grid: { color: '#F3F4F6' },
            ticks: { color: '#9CA3AF', font: { size: 11 } },
          },
          y: {
            ...yAxis,
            title: { display: true, text: unit, color: '#9CA3AF', font: { size: 11 } },
            grid: { color: '#F3F4F6' },
            ticks: { color: '#9CA3AF', font: { size: 11 }, ...yAxis.ticks },
          },
        },
      },
    });
  }

  async function loadChart(hours) {
    activeHours = hours;

    [1, 6, 24, 168].forEach(h => {
      const btn = document.getElementById('btn-' + h);
      if (h === hours) {
        btn.className = 'px-3 py-1 text-sm rounded-lg bg-blue-600 text-white transition-colors';
      } else {
        btn.className = 'px-3 py-1 text-sm rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors';
      }
    });

    const resp = await fetch('/devices/{{ device.id }}/power-chart/data?hours=' + hours);
    const data = await resp.json();

    const pts = (key, scale = 1) => data.timestamps.map((t, i) => ({ x: new Date(t + 'Z'), y: data[key][i] * scale }));

    SERIES.forEach(({ id, key, label, color, unit, yAxis, scale = 1 }) => {
      if (charts[id]) charts[id].destroy();
      charts[id] = makeChart(id, label, color, unit, yAxis, pts(key, scale));
    });
  }

  loadChart(6);
</script>
{% endblock %}
