<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Auto</title>
  <script src="/static/tailwind.js"></script>
  <script src="/static/htmx.min.js"></script>
  <link rel="stylesheet" href="/static/bootstrap-icons.min.css">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#0a1a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Home Auto">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-icon-180.png">
  <link rel="apple-touch-icon" sizes="167x167" href="/static/apple-icon-167.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/static/apple-icon-152.png">
  <link rel="apple-touch-icon" sizes="120x120" href="/static/apple-icon-120.png">
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-white shadow-sm px-4 sm:px-6 py-3 flex items-center justify-between gap-2">
    <a href="/" class="text-xl font-semibold text-gray-800 flex-shrink-0">Home Auto</a>
    <div class="flex items-center gap-2">
      <div id="red-alert-btn">
        <button
          hx-post="/red-alert"
          hx-target="#red-alert-btn"
          hx-swap="outerHTML"
          class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-1.5"
        >
          <i class="bi bi-exclamation-octagon-fill"></i>
          <span class="hidden xs:inline">RED ALERT</span>
        </button>
      </div>
      <a href="/automations"
         class="border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Automations
      </a>
      <a href="/history"
         class="border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        History
      </a>
      <a href="/network"
         class="hidden sm:inline-flex border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Network
      </a>
      <a href="/devices/hon"
         class="hidden sm:inline-flex border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        hOn A/C
      </a>
      <a href="/devices/z2m"
         class="hidden sm:inline-flex border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Zigbee
      </a>
      <a href="/devices/import"
         class="hidden sm:inline-flex border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Import Tuya
      </a>
      <a href="/devices/add"
         class="hidden sm:inline-flex bg-blue-600 text-white px-3 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">
        + Add Device
      </a>
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
