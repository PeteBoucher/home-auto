<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home Auto</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@2.0.0" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body class="bg-gray-100 min-h-screen">
  <nav class="bg-white shadow-sm px-4 sm:px-6 py-3 flex items-center justify-between gap-2">
    <a href="/" class="text-xl font-semibold text-gray-800 flex-shrink-0">Home Auto</a>
    <div class="flex items-center gap-2">
      <div id="red-alert-btn">
        <button
          hx-post="/red-alert"
          hx-target="#red-alert-btn"
          hx-swap="outerHTML"
          class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-lg text-sm font-bold transition-colors flex items-center gap-1.5"
        >
          <i class="bi bi-exclamation-octagon-fill"></i>
          <span class="hidden xs:inline">RED ALERT</span>
        </button>
      </div>
      <a href="/automations"
         class="border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Automations
      </a>
      <a href="/devices/hon"
         class="hidden sm:inline-flex border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        hOn A/C
      </a>
      <a href="/devices/z2m"
         class="hidden sm:inline-flex border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Zigbee
      </a>
      <a href="/devices/import"
         class="hidden sm:inline-flex border border-gray-300 text-gray-600 px-3 py-2 rounded-lg text-sm hover:bg-gray-50 transition-colors">
        Import Tuya
      </a>
      <a href="/devices/add"
         class="hidden sm:inline-flex bg-blue-600 text-white px-3 py-2 rounded-lg text-sm hover:bg-blue-700 transition-colors">
        + Add Device
      </a>
    </div>
  </nav>
  <main class="max-w-5xl mx-auto px-4 py-8">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
