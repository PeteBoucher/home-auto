name: CI / Deploy

on:
  push:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: |
          source /opt/home-auto/.venv/bin/activate
          pip install -q -e ".[dev]"
          pytest

      - name: Deploy
        run: |
          git -C /opt/home-auto fetch origin main
          git -C /opt/home-auto reset --hard origin/main
          sudo systemctl restart home-auto
